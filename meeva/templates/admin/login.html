<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeva Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Clash Display', sans-serif; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
        .fade-up { animation: fadeUp .5s ease-out both; }
    </style>
</head>
<body class="bg-[#0a0a0a] min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md bg-[#141414] border border-[#222] p-8 fade-up">
        <!-- Logo Section -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-white mb-4">
                <i class="fas fa-shield-alt text-2xl text-[#0a0a0a]"></i>
            </div>
            <h1 class="text-4xl font-bold text-white mb-2">MEEVA</h1>
            <p class="text-[#888] text-sm font-semibold">Admin Control Panel</p>
        </div>

        <!-- Messages -->
        {% if messages %}
            <div class="mb-6 space-y-3">
                {% for message in messages %}
                    <div class="p-3 bg-[#1a1a1a] border border-[#222] text-[#ccc] text-sm font-medium">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}

        <!-- Login Form -->
        <form method="POST" class="space-y-5" autocomplete="off">
            {% csrf_token %}
            <div>
                <label class="block text-white font-semibold text-xs uppercase tracking-wide mb-2">Email Address</label>
                <input type="email" name="email" required placeholder="Enter your email" autocomplete="new-email"
                    class="w-full px-4 py-3 bg-[#1a1a1a] border border-[#222] text-white placeholder-[#555] focus:outline-none focus:border-[#444] transition">
            </div>
            <div>
                <label class="block text-white font-semibold text-xs uppercase tracking-wide mb-2">Password</label>
                <input type="password" name="password" required placeholder="Enter your password" autocomplete="new-password"
                    class="w-full px-4 py-3 bg-[#1a1a1a] border border-[#222] text-white placeholder-[#555] focus:outline-none focus:border-[#444] transition">
            </div>
            <button type="submit" class="w-full py-3 bg-white text-[#0a0a0a] font-bold text-sm uppercase tracking-wide hover:bg-[#e0e0e0] transition">
                Sign In to Dashboard
            </button>
        </form>
    </div>
</body>
</html>
