<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - Meeva Vendor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Clash Display", sans-serif;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade-up {
        animation: fadeUp 0.5s ease-out both;
      }
    </style>
  </head>
  <body class="bg-[#0a0a0a] min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md fade-up">
      <div class="bg-[#141414] border border-[#222] p-8">
        <div class="text-center mb-8">
          <h1 class="text-3xl font-bold text-white mb-2">MEEVA</h1>
          <p class="text-[#888] text-sm font-medium">
            Vendor - Forgot Password
          </p>
        </div>

        <div class="mb-6 p-4 bg-[#0a0a0a] border border-[#222]">
          <p class="text-[#888] text-sm">
            <i class="fas fa-info-circle mr-2 text-[#555]"></i>
            Enter your registered vendor email address and we'll send you an OTP
            to reset your password.
          </p>
        </div>

        {% if messages %}
        <div class="mb-6 space-y-3">
          {% for message in messages %}
          <div
            class="p-3 bg-[#1a1a1a] border border-[#333] text-[#ccc] text-sm"
          >
            <i
              class="fas {% if message.tags == 'error' %}fa-exclamation-circle text-red-400{% else %}fa-check-circle text-green-400{% endif %} mr-2"
            ></i
            >{{ message }}
          </div>
          {% endfor %}
        </div>
        {% endif %}

        <form method="POST" class="space-y-5" autocomplete="off">
          {% csrf_token %}
          <div>
            <label class="block text-white font-semibold text-sm mb-2"
              >Email Address</label
            >
            <input
              type="email"
              name="email"
              required
              placeholder="Enter your registered vendor email"
              autocomplete="new-email"
              class="w-full px-4 py-3 bg-[#1a1a1a] border border-[#222] text-white placeholder-[#555] focus:outline-none focus:border-[#444] transition"
            />
          </div>
          <button
            type="submit"
            class="w-full py-3 bg-white text-[#0a0a0a] font-bold text-sm uppercase tracking-wide hover:bg-[#e0e0e0] transition"
          >
            <i class="fas fa-paper-plane mr-2"></i>Send OTP
          </button>
        </form>

        <div class="mt-6 text-center">
          <a
            href="{% url 'vendor_login' %}"
            class="text-[#888] hover:text-white text-sm font-medium transition"
          >
            <i class="fas fa-arrow-left mr-1"></i>Back to Login
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
