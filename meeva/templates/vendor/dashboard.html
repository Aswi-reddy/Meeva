<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Dashboard - Meeva</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: #e9d5ff;
            min-height: 100vh;
        }

        .navbar {
            background: linear-gradient(135deg, #1a1a1a 0%, #2a1a3a 100%);
            border-bottom: 2px solid rgba(147, 51, 234, 0.3);
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(147, 51, 234, 0.15);
        }

        .navbar h1 {
            font-size: 22px;
            background: linear-gradient(135deg, #9333ea 0%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: bold;
        }

        .logout-btn {
            background: linear-gradient(135deg, #9333ea 0%, #7e22ce 100%);
            border: 1px solid rgba(147, 51, 234, 0.5);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: linear-gradient(135deg, #a855f7 0%, #9333ea 100%);
            box-shadow: 0 5px 20px rgba(147, 51, 234, 0.4);
            transform: translateY(-2px);
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 30px;
        }

        .welcome-box {
            background: linear-gradient(135deg, rgba(26, 26, 26, 0.9) 0%, rgba(42, 26, 58, 0.7) 100%);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(147, 51, 234, 0.3);
            margin-bottom: 30px;
        }

        .welcome-box h2 {
            background: linear-gradient(135deg, #9333ea 0%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            font-size: 28px;
        }

        .welcome-box p {
            color: #a78bfa;
            font-size: 15px;
        }

        .info-box {
            background-color: rgba(147, 51, 234, 0.1);
            border-left: 4px solid #9333ea;
            padding: 25px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .info-box p {
            color: #c084fc;
            margin: 0;
            line-height: 1.8;
            font-size: 15px;
        }

        .info-box strong {
            color: #e9d5ff;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 15px;
            }

            .container {
                padding: 0 20px;
            }

            .welcome-box {
                padding: 30px 25px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <h1>🛒 {{ vendor.business_name }} - Vendor Dashboard</h1>
        <a href="{% url 'vendor_logout' %}" class="logout-btn">Logout</a>
    </nav>

    <div class="container">
        <div class="welcome-box">
            <h2>Welcome, {{ vendor.full_name }}!</h2>
            <p style="color: #666;">Your vendor dashboard is ready. Product management coming soon!</p>
        </div>

        <div class="info-box">
            <p><strong>🎉 Congratulations!</strong> Your account is approved. Start selling on Meeva platform!</p>
            <p style="margin-top: 10px;"><strong>Platform Fee:</strong> {{ vendor.platform_fee_percentage }}% per sale</p>
        </div>
    </div>
</body>
</html>
