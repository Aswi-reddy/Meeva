<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Register - Meeva</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Clash Display', sans-serif; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
        .fade-up { animation: fadeUp .5s ease-out both; }
    </style>
</head>
<body class="bg-[#0a0a0a] min-h-screen flex items-center justify-center px-4 py-8">
    <div class="w-full max-w-md fade-up">
        <div class="bg-[#141414] border border-[#222] p-8">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-white mb-2">MEEVA</h1>
                <p class="text-[#888] text-sm font-medium">Create Your Account</p>
            </div>

            {% if messages %}
                <div class="mb-6 space-y-3">
                    {% for message in messages %}
                        <div class="p-3 bg-[#1a1a1a] border border-[#333] text-[#ccc] text-sm">
                            <i class="fas fa-exclamation-circle mr-2 text-[#555]"></i>{{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            <form method="POST" class="space-y-4">
                {% csrf_token %}
                <div>
                    <label class="block text-white font-semibold text-sm mb-2">First Name</label>
                    <input type="text" name="first_name" required placeholder="Enter your first name"
                        class="w-full px-4 py-3 bg-[#1a1a1a] border border-[#222] text-white placeholder-[#555] focus:outline-none focus:border-[#444] transition">
                </div>
                <div>
                    <label class="block text-white font-semibold text-sm mb-2">Last Name</label>
                    <input type="text" name="last_name" required placeholder="Enter your last name"
                        class="w-full px-4 py-3 bg-[#1a1a1a] border border-[#222] text-white placeholder-[#555] focus:outline-none focus:border-[#444] transition">
                </div>
                <div>
                    <label class="block text-white font-semibold text-sm mb-2">Email Address</label>
                    <input type="email" name="email" required placeholder="Enter your email"
                        class="w-full px-4 py-3 bg-[#1a1a1a] border border-[#222] text-white placeholder-[#555] focus:outline-none focus:border-[#444] transition">
                </div>
                <div>
                    <label class="block text-white font-semibold text-sm mb-2">Password</label>
                    <input type="password" id="password" name="password" required
                        class="w-full px-4 py-3 bg-[#1a1a1a] border border-[#222] text-white placeholder-[#555] focus:outline-none focus:border-[#444] transition">
                    <div id="strength-meter" class="mt-2 text-xs"></div>
                </div>
                <div>
                    <label class="block text-white font-semibold text-sm mb-2">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" required placeholder="Confirm your password"
                        class="w-full px-4 py-3 bg-[#1a1a1a] border border-[#222] text-white placeholder-[#555] focus:outline-none focus:border-[#444] transition">
                    <div id="match-meter" class="mt-2 text-xs"></div>
                </div>
                <button type="submit" class="w-full py-3 bg-white text-[#0a0a0a] font-bold text-sm uppercase tracking-wide hover:bg-[#e0e0e0] transition mt-2">
                    <i class="fas fa-user-plus mr-2"></i>Create Account
                </button>
                <div class="text-center text-sm text-[#888]">
                    Already have an account?
                    <a href="{% url 'user_login' %}" class="text-white hover:underline font-semibold ml-1">Login</a>
                </div>
            </form>

            <div class="mt-6 text-center">
                <a href="/" class="text-[#888] hover:text-white text-sm font-medium transition">
                    <i class="fas fa-arrow-left mr-1"></i>Back to Home
                </a>
            </div>
        </div>
    </div>
    <script>
        const pwd = document.getElementById('password');
        const confirm_pwd = document.getElementById('confirm_password');
        const strengthMeter = document.getElementById('strength-meter');
        const matchMeter = document.getElementById('match-meter');

        const passwordCriteria = [
            { regex: /.{6,}/, message: '6+ characters' },
            { regex: /[A-Z]/, message: '1 uppercase' },
            { regex: /[a-z]/, message: '1 lowercase' },
            { regex: /\d/, message: '1 digit' },
            { regex: /[\W_]/, message: '1 symbol' }
        ];

        function validatePassword() {
            const password = pwd.value;
            let valid = true;
            let strengthHTML = '';

            passwordCriteria.forEach(criterion => {
                if (criterion.regex.test(password)) {
                    strengthHTML += `<span class="text-green-500 text-xs mr-2"><i class="fas fa-check-circle mr-1"></i>${criterion.message}</span>`;
                } else {
                    strengthHTML += `<span class="text-red-500 text-xs mr-2"><i class="fas fa-times-circle mr-1"></i>${criterion.message}</span>`;
                    valid = false;
                }
            });

            strengthMeter.innerHTML = strengthHTML;
            return valid;
        }

        pwd?.addEventListener('input', validatePassword);

        confirm_pwd?.addEventListener('input', function() {
            const match = this.value === pwd.value;
            if (this.value) {
                matchMeter.innerHTML = match 
                    ? '<span class="text-green-500 text-xs"><i class="fas fa-check-circle mr-1"></i>Passwords match</span>' 
                    : '<span class="text-red-500 text-xs"><i class="fas fa-times-circle mr-1"></i>Passwords don\'t match</span>';
            } else {
                matchMeter.innerHTML = '';
            }
        });

        document.querySelector('form')?.addEventListener('submit', function(e) {
            const isPasswordValid = validatePassword();
            const doPasswordsMatch = pwd.value === confirm_pwd.value;

            if (!isPasswordValid || !doPasswordsMatch) {
                e.preventDefault();
                if (!doPasswordsMatch) {
                    confirm_pwd.focus();
                    alert('Passwords do not match!');
                } else {
                    pwd.focus();
                    alert('Password does not meet all the requirements.');
                }
            }
        });
    </script>
</body>
</html>
