<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Login - Meeva</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Clash Display", sans-serif;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade-up {
        animation: fadeUp 0.5s ease-out both;
      }
    </style>
  </head>
  <body class="bg-[#0a0a0a] min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md fade-up">
      <div class="bg-[#141414] border border-[#222] p-8">
        <div class="text-center mb-8">
          <h1 class="text-3xl font-bold text-white mb-2">MEEVA</h1>
          <p class="text-[#888] text-sm font-medium">User Login</p>
        </div>

        
        <form method="POST" class="space-y-5" autocomplete="off">
          {% csrf_token %}
          <div>
            <label class="block text-white font-semibold text-sm mb-2"
              >Email Address</label
            >
            <input
              type="email"
              name="email"
              required
              placeholder="Enter your email"
              autocomplete="new-email"
              class="w-full px-4 py-3 bg-[#1a1a1a] border border-[#222] text-white placeholder-[#555] focus:outline-none focus:border-[#444] transition"
            />
          </div>
          <div>
            <label class="block text-white font-semibold text-sm mb-2"
              >Password</label
            >
            <div class="relative">
              <input
                type="password"
                name="password"
                autocomplete="new-password"
                required
                placeholder="Enter your password"
                class="w-full px-4 py-3 pr-12 bg-[#1a1a1a] border border-[#222] text-white placeholder-[#555] focus:outline-none focus:border-[#444] transition"
              />
              <button type="button" onclick="togglePassword(this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-[#555] hover:text-white transition">
                <i class="fas fa-eye-slash"></i>
              </button>
            </div>
          </div>
          <button
            type="submit"
            class="w-full py-3 bg-white text-[#0a0a0a] font-bold text-sm uppercase tracking-wide hover:bg-[#e0e0e0] transition"
          >
            <i class="fas fa-sign-in-alt mr-2"></i>Sign In
          </button>
          <div class="text-center">
            <a
              href="{% url 'user_forgot_password' %}"
              class="text-[#888] hover:text-white text-sm font-medium transition"
            >
              <i class="fas fa-key mr-1"></i>Forgot Password?
            </a>
          </div>
          <div class="text-center text-sm text-[#888]">
            Don't have an account?
            <a
              href="{% url 'user_register' %}"
              class="text-white hover:underline font-semibold ml-1"
              >Register</a
            >
          </div>
        </form>

        <div class="mt-6 text-center">
          <a
            href="/"
            class="text-[#888] hover:text-white text-sm font-medium transition"
          >
            <i class="fas fa-arrow-left mr-1"></i>Back to Home
          </a>
        </div>
      </div>
    </div>
    <script>
      function togglePassword(btn) {
        const input = btn.parentElement.querySelector('input');
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
          input.type = 'text';
          icon.classList.remove('fa-eye-slash');
          icon.classList.add('fa-eye');
        } else {
          input.type = 'password';
          icon.classList.remove('fa-eye');
          icon.classList.add('fa-eye-slash');
        }
      }
    </script>
  </body>
</html>
